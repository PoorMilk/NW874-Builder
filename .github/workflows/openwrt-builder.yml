name: OpenWrt Builder

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 1 * *"

env:
  REPO_URL: https://github.com/PoorMilk/NW874-ImmortalWrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Cache OpenWrt build
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/dl
          /workdir/openwrt/build_dir
          /workdir/openwrt/staging_dir
          /workdir/openwrt/tmp
          /workdir/openwrt/feeds
          ~/.ccache
        key: openwrt-build-${{ hashFiles('.config', 'diy-part1.sh', 'diy-part2.sh', 'feeds.conf.default') }}
        restore-keys: |
          openwrt-build-
          openwrt-cache-

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Fix Go version for Go packages
      run: |
        cd openwrt
        rm -rf feeds/packages/lang/golang
        git clone https://github.com/sbwml/packages_lang_golang -b 23.x feeds/packages/lang/golang
        ./scripts/feeds update packages
        ./scripts/feeds install -a -p packages golang

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        echo "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_qihoo_360t7=y" >> .config
        sed -i '/CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_/s/^/# /' .config
        sed -i 's/^# \(CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_qihoo_360t7=y\)/\1/' .config
        make defconfig
        make download -j8

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.FILE_DATE }}
        path: openwrt/bin/targets/mediatek/filogic/*.bin

    - name: Package firmware for release
      id: package_release
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      run: |
        cd ${{ env.FIRMWARE }}
        RELEASE_TAG=$(date +%Y%m%d-%H%M%S)
        zip -r NW874-360T7-OpenWrt-$RELEASE_TAG.zip .
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
        echo "ZIP_FILE=NW874-360T7-OpenWrt-$RELEASE_TAG.zip" >> $GITHUB_ENV

    - name: Create Release
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: "NW874-360T7 OpenWrt ${{ env.RELEASE_TAG }}"
        files: ${{ env.FIRMWARE }}/${{ env.ZIP_FILE }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Keep latest 2 releases
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const releases = await github.paginate(github.rest.repos.listReleases, {
            owner, repo, per_page: 100
          });
          const toDelete = releases.slice(2);
          for (const rel of toDelete) {
            await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id });
            await github.rest.git.deleteRef({ owner, repo, ref: `tags/${rel.tag_name}` }).catch(() => {});
          }

    - name: Keep latest 5 workflow runs
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
            owner, repo,
            per_page: 100
          });
          const toDelete = runs.slice(5);
          for (const run of toDelete) {
            await github.rest.actions.deleteWorkflowRun({
              owner, repo,
              run_id: run.id
            });
          }
