name: Prepare Config

on:
  push:
    paths:
      - '.config'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare config
        run: |
          # 先复制你的精简配置
          cp .config .config.original
          
          # 运行 defconfig（它会自动补全依赖）
          make defconfig
          
          # 看看它改动了什么
          diff .config.original .config || true
